name: Daily AI Horoscope

on:
  schedule:
    - cron: '0 23 * * *'  # 08:00 KST
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai httpx

      - name: Generate horoscope
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate.py

      - name: Save to Bot Manager DB
        run: |
          BOT_URL="http://192.168.32.55:6030"

          # Check bot manager is reachable
          if ! curl -sf "$BOT_URL/api/status" > /dev/null 2>&1; then
            echo "Bot Manager not reachable at $BOT_URL — skipping DB save"
            exit 0
          fi

          # Save horoscope to bot manager DB (no tweet posting — that's handled by CDP pipeline)
          RESPONSE=$(curl -sf -X POST "$BOT_URL/api/services/horoscope/publish?account_slug=ai-horoscope" \
            -H "Content-Type: application/json" 2>&1) || true
          echo "Saved to DB: $RESPONSE"

      - name: Trigger tweet via Bot Manager pipeline
        run: |
          BOT_URL="http://192.168.32.55:6030"

          # Trigger the horoscope pipeline which posts via CDP
          RESPONSE=$(curl -sf -X POST "$BOT_URL/api/jobs/ai-horoscope_horoscope_pipeline/trigger" 2>&1) || true
          echo "Pipeline trigger: $RESPONSE"

          # Wait for tweet to be posted
          sleep 30

          # Check if tweet was posted by querying the latest horoscope
          TWEET_URL=$(curl -sf "$BOT_URL/api/services/horoscope/today" 2>&1 | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(d.get('tweet_id', ''))
          except:
              print('')
          " 2>/dev/null)

          if [ -n "$TWEET_URL" ]; then
            echo "Tweet posted!"
            python3 -c "
          import json
          data = json.load(open('data/latest.json'))
          data['tweet_id'] = '$TWEET_URL'
          data['tweet_url'] = 'https://x.com/dev_horoscope/status/$TWEET_URL'
          json.dump(data, open('data/latest.json', 'w'), ensure_ascii=False, indent=2)
          "
          else
            echo "Tweet not yet posted — Chrome CDP may not be running"
          fi
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🔮 $(date +%Y-%m-%d) horoscope"
          git push origin main

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN_DEPLOY: ${{ secrets.GITHUB_TOKEN_DEPLOY }}
        run: |
          # Push to GitHub to trigger Pages deployment
          git remote add github "https://x-access-token:${GITHUB_TOKEN_DEPLOY}@github.com/jiunbae/ai-horoscope.git" 2>/dev/null || \
          git remote set-url github "https://x-access-token:${GITHUB_TOKEN_DEPLOY}@github.com/jiunbae/ai-horoscope.git"
          git push github main --force
        continue-on-error: true
