name: Daily AI Horoscope

on:
  schedule:
    - cron: '0 23 * * *'  # 08:00 KST
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai httpx

      - name: Generate horoscope
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate.py

      - name: Post tweet via Bot Manager
        run: |
          echo "=== Posting tweet via Bot Manager ==="

          # Runner is in Docker, use host IP to reach bot manager
          BOT_URL="http://192.168.32.55:6030"

          # Check bot manager is reachable
          if ! curl -sf "$BOT_URL/api/status" > /dev/null 2>&1; then
            echo "Bot Manager not reachable at $BOT_URL"
            exit 0
          fi
          echo "Bot Manager is online"

          # Post via bot manager API
          RESPONSE=$(curl -sf -X POST "$BOT_URL/api/services/horoscope/publish?account_slug=ai-horoscope" \
            -H "Content-Type: application/json" 2>&1) || true

          echo "Response: $RESPONSE"

          # Extract tweet_id if available
          TWEET_ID=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              print(d.get('tweet_id', ''))
          except:
              print('')
          " 2>/dev/null)

          if [ -n "$TWEET_ID" ]; then
            echo "Tweet posted: $TWEET_ID"
            python3 -c "
          import json
          data = json.load(open('data/latest.json'))
          data['tweet_id'] = '$TWEET_ID'
          data['tweet_url'] = 'https://x.com/dev_horoscope/status/$TWEET_ID'
          json.dump(data, open('data/latest.json', 'w'), ensure_ascii=False, indent=2)
          "
          else
            echo "Tweet not posted (bot manager may need Chrome CDP session)"
          fi
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🔮 $(date +%Y-%m-%d) horoscope"
          git push origin main

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN_DEPLOY: ${{ secrets.GITHUB_TOKEN_DEPLOY }}
        run: |
          # Push to GitHub to trigger Pages deployment
          git remote add github "https://x-access-token:${GITHUB_TOKEN_DEPLOY}@github.com/jiunbae/ai-horoscope.git" 2>/dev/null || \
          git remote set-url github "https://x-access-token:${GITHUB_TOKEN_DEPLOY}@github.com/jiunbae/ai-horoscope.git"
          git push github main --force
        continue-on-error: true
