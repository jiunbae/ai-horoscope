<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bgD" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <linearGradient id="accentD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgD)"/>

  <!-- Subtle ring -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.1"/>

  <!-- Central symbol: stylized Z (Zephyros) + crystal ball -->

  <!-- Crystal ball (center) -->
  <circle cx="200" cy="185" r="60" fill="none" stroke="url(#accentD)" stroke-width="2.5"/>
  <circle cx="200" cy="185" r="55" fill="#4c1d95" opacity="0.15"/>

  <!-- Z letter inside ball (stylized) -->
  <path d="M170,165 L230,165 L170,205 L230,205" stroke="url(#accentD)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ball shine -->
  <ellipse cx="185" cy="165" rx="15" ry="8" fill="#fff" opacity="0.08" transform="rotate(-15 185 165)"/>

  <!-- Pedestal -->
  <path d="M175,245 L225,245 L235,260 L165,260Z" fill="#2d1b69" opacity="0.6"/>
  <ellipse cx="200" cy="245" rx="30" ry="6" fill="#2d1b69" opacity="0.4"/>

  <!-- Three dots below (mystical) -->
  <circle cx="185" cy="285" r="4" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="200" cy="285" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="215" cy="285" r="4" fill="#8b5cf6" opacity="0.5"/>

  <!-- Text: 제피로스 -->
  <text x="200" y="325" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="20" fill="#8b5cf6" opacity="0.7" letter-spacing="8">제피로스</text>

  <!-- Subtle particles -->
  <g fill="#a78bfa" opacity="0.4">
    <circle cx="120" cy="120" r="2"/>
    <circle cx="280" cy="130" r="1.5"/>
    <circle cx="100" cy="260" r="1.5"/>
    <circle cx="300" cy="250" r="2"/>
    <circle cx="150" cy="80" r="1"/>
    <circle cx="260" cy="300" r="1"/>
  </g>

  <!-- Corner accents -->
  <path d="M50,50 L80,50 L50,80" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M350,50 L320,50 L350,80" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M50,350 L80,350 L50,320" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M350,350 L320,350 L350,320" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.2"/>
</svg>
