<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bgC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgC)"/>

  <!-- Stars -->
  <g fill="#fef3c7" opacity="0.6">
    <circle cx="80" cy="60" r="3"/><circle cx="320" cy="80" r="2"/>
    <circle cx="50" cy="200" r="2"/><circle cx="350" cy="180" r="3"/>
    <circle cx="100" cy="340" r="2"/><circle cx="300" cy="320" r="2"/>
  </g>

  <!-- Body (round, cute) -->
  <ellipse cx="200" cy="310" rx="70" ry="50" fill="#5b21b6"/>

  <!-- Big head (chibi proportions) -->
  <circle cx="200" cy="170" r="90" fill="#fde68a"/>

  <!-- Wizard hat -->
  <polygon points="200,20 140,140 260,140" fill="#5b21b6"/>
  <polygon points="200,20 160,120 240,120" fill="#7c3aed"/>
  <!-- Hat brim -->
  <ellipse cx="200" cy="140" rx="95" ry="20" fill="#5b21b6"/>
  <!-- Hat star -->
  <text x="190" y="95" font-size="24" fill="#fbbf24">★</text>

  <!-- Cheeks (blush) -->
  <circle cx="150" cy="200" r="15" fill="#f9a8d4" opacity="0.5"/>
  <circle cx="250" cy="200" r="15" fill="#f9a8d4" opacity="0.5"/>

  <!-- Eyes (big, cute) -->
  <g>
    <!-- Left eye -->
    <circle cx="170" cy="185" r="18" fill="#1e1b4b"/>
    <circle cx="170" cy="183" r="14" fill="#8b5cf6"/>
    <circle cx="165" cy="178" r="6" fill="#fff"/>
    <circle cx="175" cy="185" r="3" fill="#fff" opacity="0.5"/>

    <!-- Right eye -->
    <circle cx="230" cy="185" r="18" fill="#1e1b4b"/>
    <circle cx="230" cy="183" r="14" fill="#8b5cf6"/>
    <circle cx="225" cy="178" r="6" fill="#fff"/>
    <circle cx="235" cy="185" r="3" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Smile (cute w shape) -->
  <path d="M185,215 Q192,225 200,218 Q208,225 215,215" stroke="#5b21b6" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Crystal ball (held in front) -->
  <circle cx="200" cy="290" r="22" fill="#c4b5fd" opacity="0.3" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="200" cy="288" r="10" fill="#60a5fa" opacity="0.5"/>
  <circle cx="195" cy="283" r="4" fill="#fff" opacity="0.6"/>

  <!-- Tiny hands -->
  <circle cx="172" cy="285" r="10" fill="#fde68a"/>
  <circle cx="228" cy="285" r="10" fill="#fde68a"/>

  <!-- Cape/robe flowing -->
  <path d="M130,310 Q120,370 150,380" stroke="#7c3aed" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M270,310 Q280,370 250,380" stroke="#7c3aed" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Sparkles around -->
  <g fill="#fbbf24" opacity="0.7">
    <text x="90" y="120" font-size="16">✨</text>
    <text x="290" y="110" font-size="12">✨</text>
    <text x="70" y="280" font-size="14">✨</text>
    <text x="310" y="260" font-size="16">✨</text>
  </g>
</svg>
