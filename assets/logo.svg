<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <!-- Crystal ball glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <!-- Ball surface -->
    <radialGradient id="ball" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.1"/>
    </radialGradient>
    <!-- Inner energy -->
    <radialGradient id="energy" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Star filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer glow -->
  <circle cx="256" cy="230" r="180" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="#e2e8f0" opacity="0.6" filter="url(#starGlow)">
    <circle cx="120" cy="100" r="2"/>
    <circle cx="380" cy="80" r="1.5"/>
    <circle cx="90" cy="200" r="1"/>
    <circle cx="420" cy="180" r="2"/>
    <circle cx="150" cy="350" r="1.5"/>
    <circle cx="370" cy="370" r="1"/>
    <circle cx="200" cy="60" r="1.5"/>
    <circle cx="320" cy="400" r="1"/>
    <circle cx="440" cy="300" r="1.5"/>
    <circle cx="70" cy="320" r="1"/>
  </g>

  <!-- Crystal ball base/pedestal -->
  <ellipse cx="256" cy="340" rx="80" ry="15" fill="#2d1b69" opacity="0.8"/>
  <rect x="216" y="330" width="80" height="20" rx="5" fill="#2d1b69" opacity="0.6"/>

  <!-- Crystal ball outline -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>

  <!-- Crystal ball surface -->
  <circle cx="256" cy="220" r="118" fill="url(#ball)"/>

  <!-- Circuit patterns inside ball -->
  <g stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Horizontal lines -->
    <line x1="190" y1="200" x2="250" y2="200"/>
    <line x1="270" y1="220" x2="320" y2="220"/>
    <line x1="200" y1="240" x2="260" y2="240"/>

    <!-- Vertical connections -->
    <line x1="250" y1="200" x2="250" y2="220"/>
    <line x1="270" y1="210" x2="270" y2="240"/>
    <line x1="230" y1="220" x2="230" y2="250"/>

    <!-- Nodes (circuit junctions) -->
    <circle cx="250" cy="200" r="3" fill="#60a5fa"/>
    <circle cx="270" cy="220" r="3" fill="#60a5fa"/>
    <circle cx="230" cy="240" r="4" fill="#818cf8"/>
    <circle cx="260" cy="240" r="3" fill="#60a5fa"/>
    <circle cx="250" cy="220" r="3" fill="#60a5fa"/>

    <!-- Diagonal paths -->
    <line x1="230" y1="180" x2="250" y2="200"/>
    <line x1="270" y1="220" x2="290" y2="250"/>
    <line x1="210" y1="220" x2="230" y2="240"/>
  </g>

  <!-- Central AI "eye" / energy core -->
  <circle cx="256" cy="215" r="25" fill="url(#energy)"/>
  <circle cx="256" cy="215" r="12" fill="#60a5fa" opacity="0.6"/>
  <circle cx="256" cy="215" r="5" fill="#e0e7ff" opacity="0.9"/>

  <!-- Light reflection on ball -->
  <ellipse cx="230" cy="175" rx="25" ry="15" fill="white" opacity="0.15" transform="rotate(-20 230 175)"/>

  <!-- Orbiting particles -->
  <g fill="#a78bfa" opacity="0.7">
    <circle cx="170" cy="160" r="4">
      <animateTransform attributeName="transform" type="rotate" values="0 256 220;360 256 220" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="280" r="3">
      <animateTransform attributeName="transform" type="rotate" values="120 256 220;480 256 220" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="300" r="2.5">
      <animateTransform attributeName="transform" type="rotate" values="240 256 220;600 256 220" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom text area - "AI" characters as neural pattern -->
  <g transform="translate(256, 395)" fill="#8b5cf6" opacity="0.7">
    <circle cx="-15" cy="0" r="3"/>
    <circle cx="0" cy="-10" r="3"/>
    <circle cx="15" cy="0" r="3"/>
    <circle cx="0" cy="10" r="3"/>
    <line x1="-15" y1="0" x2="0" y2="-10" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="0" y1="-10" x2="15" y2="0" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="15" y1="0" x2="0" y2="10" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="0" y1="10" x2="-15" y2="0" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>
