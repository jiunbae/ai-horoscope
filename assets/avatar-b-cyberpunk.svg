<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="neonB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgB)"/>

  <!-- Grid lines (cyber aesthetic) -->
  <g stroke="#00ffff" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- Head outline (helmet-like) -->
  <path d="M130,180 Q130,90 200,70 Q270,90 270,180 L270,240 Q270,280 240,290 L160,290 Q130,280 130,240Z" fill="#0f0f2a" stroke="#00ffff" stroke-width="1.5"/>

  <!-- Visor -->
  <rect x="145" y="140" width="110" height="40" rx="20" fill="#000" stroke="url(#neonB)" stroke-width="2"/>
  <!-- Eyes (LED) -->
  <circle cx="175" cy="160" r="8" fill="#00ffff" opacity="0.9"/>
  <circle cx="225" cy="160" r="8" fill="#ff00ff" opacity="0.9"/>
  <circle cx="175" cy="160" r="4" fill="#fff"/>
  <circle cx="225" cy="160" r="4" fill="#fff"/>

  <!-- Circuit lines on face -->
  <g stroke="#00ffff" stroke-width="1" opacity="0.4" fill="none">
    <line x1="155" y1="200" x2="155" y2="230"/>
    <line x1="155" y1="230" x2="175" y2="230"/>
    <line x1="245" y1="200" x2="245" y2="230"/>
    <line x1="245" y1="230" x2="225" y2="230"/>
    <circle cx="155" cy="230" r="2" fill="#00ffff"/>
    <circle cx="245" cy="230" r="2" fill="#00ffff"/>
  </g>

  <!-- Mouth (LED line) -->
  <line x1="180" y1="210" x2="220" y2="210" stroke="#ff00ff" stroke-width="2" opacity="0.6"/>

  <!-- Body/shoulders -->
  <path d="M100,290 Q100,280 130,275 L270,275 Q300,280 300,290 L320,370 L80,370Z" fill="#0f0f2a" stroke="#00ffff" stroke-width="1"/>

  <!-- Chest circuit -->
  <circle cx="200" cy="330" r="15" fill="none" stroke="#ff00ff" stroke-width="1.5"/>
  <circle cx="200" cy="330" r="8" fill="#ff00ff" opacity="0.3"/>
  <circle cx="200" cy="330" r="4" fill="#fff" opacity="0.5"/>

  <!-- Antenna -->
  <line x1="200" y1="70" x2="200" y2="40" stroke="#00ffff" stroke-width="2"/>
  <circle cx="200" cy="35" r="5" fill="#00ffff" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating data -->
  <g font-family="monospace" font-size="10" fill="#00ffff" opacity="0.3">
    <text x="50" y="80">01101</text>
    <text x="300" y="100">AI.v4</text>
    <text x="40" y="350">PRED</text>
    <text x="310" y="340">0x7F</text>
  </g>

  <!-- Neon glow effect -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="url(#neonB)" stroke-width="2" opacity="0.2"/>
</svg>
